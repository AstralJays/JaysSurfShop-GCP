name: Upwind Manual Image Scan

# Manual SCA scan via Upwind Shift Left actions.
# Requires: UPWIND_CLIENT_ID, UPWIND_CLIENT_SECRET,
#           GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_DEPLOY_SERVICE_ACCOUNT (or GCP_SCAN_SERVICE_ACCOUNT),
#           GCP_ARTIFACT_REGISTRY_HOST, GCP_REGION

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to scan
        type: choice
        options:
          - all
          - frontend
          - chat-rag
          - board-generator
        default: all
      image_tag:
        description: Image tag (registry mode) or local tag suffix (build mode)
        type: string
        default: latest
      scan_mode:
        description: Pull from Artifact Registry or build from Dockerfile on the runner
        type: choice
        options:
          - registry
          - build
        default: registry

env:
  GCP_REGION: us-central1
  NAME_PREFIX: jays-surf-shop-demo

permissions:
  id-token: write
  contents: read

jobs:
  scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(
          inputs.service == 'all'
          && '["frontend","chat-rag","board-generator"]'
          || format('["{0}"]', inputs.service)
          ) }}
    steps:
      - name: Check Upwind credentials
        env:
          UPWIND_CLIENT_ID: ${{ secrets.UPWIND_CLIENT_ID }}
          UPWIND_CLIENT_SECRET: ${{ secrets.UPWIND_CLIENT_SECRET }}
        run: |
          if [ -z "$UPWIND_CLIENT_ID" ] || [ -z "$UPWIND_CLIENT_SECRET" ]; then
            echo "::error::Add UPWIND_CLIENT_ID and UPWIND_CLIENT_SECRET to this repo's Actions secrets."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Resolve build context
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            frontend)         echo "context=frontend" ;;
            chat-rag)         echo "context=services/chat-rag" ;;
            board-generator)  echo "context=services/board-generator" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Resolve scan service account
        if: inputs.scan_mode == 'registry'
        id: gcp_scan
        env:
          SCAN_SA: ${{ secrets.GCP_SCAN_SERVICE_ACCOUNT }}
          DEPLOY_SA: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
        run: |
          SA="${SCAN_SA:-$DEPLOY_SA}"
          if [ -z "$SA" ]; then
            echo "::error::Set GCP_SCAN_SERVICE_ACCOUNT or GCP_DEPLOY_SERVICE_ACCOUNT"
            exit 1
          fi
          echo "service_account=${SA}" >> "$GITHUB_OUTPUT"

      - id: auth
        if: inputs.scan_mode == 'registry'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.gcp_scan.outputs.service_account }}

      - uses: google-github-actions/setup-gcloud@v2
        if: inputs.scan_mode == 'registry'

      - name: Configure Docker for Artifact Registry
        if: inputs.scan_mode == 'registry'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image reference
        id: image
        run: |
          if [ "${{ inputs.scan_mode }}" = "registry" ]; then
            IMAGE="${{ secrets.GCP_ARTIFACT_REGISTRY_HOST }}/${{ env.NAME_PREFIX }}/${{ matrix.service }}:${{ inputs.image_tag }}"
          else
            IMAGE="${{ env.NAME_PREFIX }}-${{ matrix.service }}:${{ inputs.image_tag }}"
          fi
          echo "ref=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Scan target: ${IMAGE}"

      - name: Pull image from Artifact Registry
        if: inputs.scan_mode == 'registry'
        run: docker pull "${{ steps.image.outputs.ref }}"

      - name: Build image locally
        if: inputs.scan_mode == 'build'
        run: docker build -t "${{ steps.image.outputs.ref }}" "./${{ steps.ctx.outputs.context }}"

      - name: Tag image for local-only scan
        id: scan-image
        run: |
          LOCAL="${{ env.NAME_PREFIX }}-${{ matrix.service }}:${{ inputs.image_tag }}"
          docker tag "${{ steps.image.outputs.ref }}" "$LOCAL"
          echo "ref=${LOCAL}" >> "$GITHUB_OUTPUT"
          echo "Local scan tag: ${LOCAL}"

      - name: Shift Left Image Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: ${{ steps.scan-image.outputs.ref }}
          pull_image: false
          use_sudo: false
          commit_sha: ${{ github.sha }}
          additional_registries: ${{ inputs.scan_mode == 'registry' && secrets.GCP_ARTIFACT_REGISTRY_HOST || '' }}
